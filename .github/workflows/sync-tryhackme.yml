name: Validate portfolio

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile updater
        run: python -m py_compile portfolio.py
      - name: Validate JSON data
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for path in Path("data").glob("*.json"):
              json.loads(path.read_text(encoding="utf-8"))
              print(f"valid: {path}")
          PY
      - name: Check private browser state is ignored
        run: git check-ignore .thm-browser/test-cookie
